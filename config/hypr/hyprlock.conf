general {
        grace = 10
        immediate_render = true
        hide_cursor = true
        ignore_empty_input = true
}

background {
           monitor =
           path =
           color = rgba(25, 20, 20, 10)
           blur_passes = 2
}

# date
label {
      monitor =
      text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
      font_size = 48 
      font_family = Iosevka
      position = 0, -60
      halign = center
      valign = center
}

# user
label {
      monitor =
      text = $USER
      font_size = 36
      font_family = Iosevka
      position = 0, 275
      halign = center
      valign = bottom
}

# input field
input-field {
            monitor = 
            font_size = 36
            font_family = Iosevka
            size = 230, 70
            outline_thickness = 10
            dots_size = 0.3
            dots_spacing = 0.2
            dots_center = true
            fade_on_empty = false
            hide_input = false
            position = 0, 100
            halign = center
            valign = bottom
}